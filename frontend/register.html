<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a free Talentio account." />
  <title>Register — Talentio</title>
  <link rel="icon" type="image/png" href="public/favicon.png" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body class="auth-page">

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-brand">
      <a href="index.html" aria-label="Talentio Home" style="display: flex; align-items: center;">
        <img src="public/logo.png" alt="Talentio Logo" style="height: 4em; width: 4em; object-fit: contain; vertical-align: middle;" />
      </a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Start building your CV today</p>
      </div>

      <!-- Alert Box -->
      <div id="alert-box" class="alert hidden" role="alert" aria-live="polite"></div>

      <form id="register-form" class="auth-form" novalidate aria-label="Register form">

        <div class="form-group">
          <label for="full-name">Full Name <span class="required" aria-hidden="true">*</span></label>
          <input
            type="text"
            id="full-name"
            name="full_name"
            placeholder="e.g. John Doe"
            autocomplete="name"
            required
            aria-required="true"
            aria-describedby="full-name-error"
          />
          <span class="field-error" id="full-name-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="required" aria-hidden="true">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="e.g. john@example.com"
            autocomplete="email"
            required
            aria-required="true"
            aria-describedby="email-error"
          />
          <span class="field-error" id="email-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required" aria-hidden="true">*</span></label>
          <div class="input-with-toggle">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
              aria-required="true"
              aria-describedby="password-error password-hint"
            />
            <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="password">
              👁️
            </button>
          </div>
          <span class="field-hint" id="password-hint">At least 8 characters with a letter and a number.</span>
          <span class="field-error" id="password-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password <span class="required" aria-hidden="true">*</span></label>
          <div class="input-with-toggle">
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              required
              aria-required="true"
              aria-describedby="confirm-password-error"
            />
            <button type="button" class="toggle-password" aria-label="Toggle confirm password visibility" data-target="confirm-password">
              👁️
            </button>
          </div>
          <span class="field-error" id="confirm-password-error" role="alert"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden" aria-hidden="true">⏳</span>
        </button>

      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Log in here</a></p>
      </div>
    </div>
  </main>

  <script type="module" src="assets/js/modules/auth.js"></script>
</body>
</html>
